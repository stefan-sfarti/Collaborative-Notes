spring:
  application:
    name: CollabNotes

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/collabnotes}
    username: ${SPRING_DATASOURCE_USERNAME:collabuser}
    password: ${SPRING_DATASOURCE_PASSWORD:collabpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/collabnotes}

app:
  auth:
    jwt:
      secret-key: ${APP_AUTH_JWT_SECRET_KEY:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256BitsLong}
      expiration-ms: ${APP_AUTH_JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*}

server:
  port: ${SERVER_PORT:5000}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
      percentiles:
        http:
          server:
            requests: 0.5, 0.9, 0.95, 0.99
  endpoint:
    prometheus:
      enabled: true

logging:
  level:
    com.collabnotes: INFO
    org.springframework.security: DEBUG
  file:
    name: /var/log/spring-boot/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  logging:
    level:
      com.collabnotes: DEBUG
      org.springframework.security: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
  logging:
    level:
      com.collabnotes: INFO
      org.springframework.security: WARN
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
