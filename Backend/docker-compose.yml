  #     - keycloak
  #   networks:
  #     - collabnotes-network

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: collabnotes-postgres
    environment:
      - POSTGRES_DB=collabnotes
      - POSTGRES_USER=collabuser
      - POSTGRES_PASSWORD=collabpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - collabnotes-network

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: collabnotes-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - collabnotes-network

  # Keycloak for authentication
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: collabnotes-keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=dev-file
    ports:
      - "8080:8080"
    networks:
      - collabnotes-network

networks:
  collabnotes-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
